version: "3"

services:
  next-app:
    build:
      context: ./next-app
      dockerfile: prod.Dockerfile
      args:
        ENV_VARIABLE: ${ENV_VARIABLE}
        NEXT_PUBLIC_ENV_VARIABLE: ${NEXT_PUBLIC_ENV_VARIABLE}
    restart: always
    ports:
      - 3000
    networks:
      - dokploy-network
      #- default
    labels:
       - traefik.enable=true
       #- traefik.docker.network=dokploy-network

       # Enrutamiento HTTP a HTTPS
       - traefik.http.routers.testing-gameinis.rule=Host(`testing-composer.gameinis.com`)
       - traefik.http.routers.testing-gameinis.entrypoints=web
       - traefik.http.routers.testing-gameinis.middlewares=redirect-to-https@file

       # Enrutamiento HTTPS (Seguro)
       - traefik.http.routers.testing-gameinis-secure.rule=Host(`testing-composer.gameinis.com`)
       - traefik.http.routers.testing-gameinis-secure.entrypoints=websecure
       - traefik.http.routers.testing-gameinis-secure.tls.certresolver=letsencrypt

       # Conexión al puerto interno de tu app
       - traefik.http.services.testing-gameinis-secure.loadbalancer.server.port=3000
networks:
  dokploy-network:
    external: true
